  <!-- Reminder Sound -->
<script>
  var reminderSoundInterval = null;

  function playReminderSound() {
    // Stop any existing sound first
    stopReminderSound();
    // Play immediately
    playBeeps();
    // Then repeat every 4 seconds until dismissed
    reminderSoundInterval = setInterval(playBeeps, 4000);
  }

  function stopReminderSound() {
    if (reminderSoundInterval !== null) {
      clearInterval(reminderSoundInterval);
      reminderSoundInterval = null;
    }
  }

  function playBeeps() {
    try {
      var context = new (window.AudioContext || 
                    window.webkitAudioContext)();
      function beep(frequency, duration, delay) {
        var oscillator = context.createOscillator();
        var gainNode = context.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(context.destination);
        oscillator.frequency.value = frequency;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(
          0.3, context.currentTime + delay);
        gainNode.gain.exponentialRampToValueAtTime(
          0.001, context.currentTime + delay + duration);
        oscillator.start(context.currentTime + delay);
        oscillator.stop(context.currentTime + delay + duration);
      }
      // 3 beeps
      beep(800, 0.3, 0.0);
      beep(800, 0.3, 0.4);
      beep(1000, 0.5, 0.8);
    } catch(e) {
      console.log('Audio error: ' + e);
    }
  }
</script>
